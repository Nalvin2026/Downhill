<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Brutalist DH//TRACKER app icon
       Ink background, big acid DH wordmark, double-slash accent.
       Designed to read at any size from 32px upward; all content stays
       within the 80% maskable safe zone (40px inset on each side). -->
  <rect width="512" height="512" fill="#0A0A0A"/>

  <!-- Subtle scanline texture -->
  <g fill="#1A1A19">
    <rect x="0" y="32"  width="512" height="2"/>
    <rect x="0" y="96"  width="512" height="2"/>
    <rect x="0" y="160" width="512" height="2"/>
    <rect x="0" y="224" width="512" height="2"/>
    <rect x="0" y="288" width="512" height="2"/>
    <rect x="0" y="352" width="512" height="2"/>
    <rect x="0" y="416" width="512" height="2"/>
    <rect x="0" y="480" width="512" height="2"/>
  </g>

  <!-- Heavy DH wordmark, centered inside safe zone -->
  <text
    x="256"
    y="332"
    font-family="Archivo Black, Arial Black, Helvetica, sans-serif"
    font-size="260"
    font-weight="900"
    fill="#DBFF00"
    text-anchor="middle"
    letter-spacing="-12"
  >DH</text>

  <!-- Double slash accent under the mark — keeps the // motif visible at icon scale -->
  <rect x="120" y="364" width="50"  height="22" fill="#EDE9D8"/>
  <rect x="180" y="364" width="50"  height="22" fill="#EDE9D8"/>
  <rect x="240" y="364" width="232" height="22" fill="#DBFF00"/>

  <!-- Bottom mark / chevron pointing down — downhill direction -->
  <polygon
    points="232,420 280,420 256,460"
    fill="#FF3336"
    stroke="#0A0A0A"
    stroke-width="3"
  />
</svg>
